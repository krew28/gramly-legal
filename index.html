<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gramly — Legal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0D0D0D;
      color: #e5e5e5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container {
      max-width: 560px;
      width: 100%;
      text-align: center;
    }
    .logo {
      font-size: 2.4rem;
      font-weight: 800;
      color: #4ADE80;
      letter-spacing: -0.5px;
      margin-bottom: 0.25rem;
    }
    .tagline {
      color: #777;
      font-size: 0.9rem;
      margin-bottom: 3rem;
    }
    h1 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 1.5rem;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    .card {
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 1.5rem 1.25rem;
      text-decoration: none;
      transition: border-color 0.2s, background 0.2s;
    }
    .card:hover {
      border-color: #4ADE80;
      background: #1a1a1a;
    }
    .card-icon {
      font-size: 1.8rem;
      margin-bottom: 0.6rem;
    }
    .card-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: #e5e5e5;
      margin-bottom: 0.2rem;
    }
    .card-lang {
      font-size: 0.75rem;
      color: #4ADE80;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }
    footer {
      margin-top: 3rem;
      color: #444;
      font-size: 0.78rem;
    }
    footer a { color: #555; text-decoration: none; }
    footer a:hover { color: #4ADE80; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Gramly</div>
    <div class="tagline">Nutrition, powered by AI</div>

    <h1>Legal Documents</h1>

    <div class="grid">
      <a class="card" href="privacy-es.html">
        <div class="card-icon">🔒</div>
        <div class="card-title">Política de Privacidad</div>
        <div class="card-lang">Español</div>
      </a>
      <a class="card" href="privacy-en.html">
        <div class="card-icon">🔒</div>
        <div class="card-title">Privacy Policy</div>
        <div class="card-lang">English</div>
      </a>
      <a class="card" href="terms-es.html">
        <div class="card-icon">📄</div>
        <div class="card-title">Términos y Condiciones</div>
        <div class="card-lang">Español</div>
      </a>
      <a class="card" href="terms-en.html">
        <div class="card-icon">📄</div>
        <div class="card-title">Terms of Service</div>
        <div class="card-lang">English</div>
      </a>
    </div>

    <footer>
      <p>© 2026 Gramly · Krew Designs · <a href="mailto:krewdesigns.app@gmail.com">krewdesigns.app@gmail.com</a></p>
    </footer>
  </div>
</body>
</html>
